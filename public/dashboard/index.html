<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saban AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto flex justify-between items-center mb-8">
        <div>
            <h1 class="text-3xl font-bold text-emerald-400">H.SABAN AI</h1>
            <p class="text-slate-400">ניטור מכסות וסוכנים בזמן אמת</p>
        </div>
        <div class="flex items-center gap-2 px-4 py-2 glass rounded-full">
            <div class="w-3 h-3 bg-emerald-500 rounded-full status-pulse"></div>
            <span class="text-sm font-medium">מערכת מחוברת</span>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="glass p-6 rounded-2xl">
            <i data-lucide="key" class="text-emerald-400 mb-2"></i>
            <div class="text-sm text-slate-400">מפתחות פעילים</div>
            <div id="active-keys-count" class="text-2xl font-bold">4/4</div>
        </div>
        <div class="glass p-6 rounded-2xl">
            <i data-lucide="zap" class="text-blue-400 mb-2"></i>
            <div class="text-sm text-slate-400">מודל נוכחי</div>
            <div id="current-model" class="text-lg font-bold truncate">Flash-Lite 3.1</div>
        </div>
        <div class="glass p-6 rounded-2xl">
            <i data-lucide="alert-triangle" class="text-amber-400 mb-2"></i>
            <div class="text-sm text-slate-400">שגיאות מכסה (24ש')</div>
            <div id="error-count" class="text-2xl font-bold text-amber-400">0</div>
        </div>
        <div class="glass p-6 rounded-2xl">
            <i data-lucide="database" class="text-purple-400 mb-2"></i>
            <div class="text-sm text-slate-400">קריאות מוצלחות</div>
            <div id="success-count" class="text-2xl font-bold">0</div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 glass rounded-3xl p-6">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="activity"></i> סטטוס בריכת מפתחות
            </h2>
            <div id="keys-list" class="space-y-4">
                </div>
        </div>

        <div class="glass rounded-3xl p-6 h-[500px] flex flex-col">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="list"></i> לוגים אחרונים
            </h2>
            <div id="logs-container" class="space-y-3 overflow-y-auto flex-1 pr-2">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            // רמי, הכנס כאן את ה-Config שלך מה-Vercel
            apiKey: "...",
            databaseURL: "https://your-rtdb.firebaseio.com",
            projectId: "...",
            appId: "..."
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ניטור לוגים בזמן אמת
        const logsRef = query(ref(db, 'saban94/dashboard/quota_logs'), limitToLast(20));
        
        onValue(logsRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            const logsContainer = document.getElementById('logs-container');
            logsContainer.innerHTML = '';
            
            let successes = 0;
            let errors = 0;
            const keyStats = { 1: 'Online', 2: 'Online', 3: 'Online', 4: 'Online' };

            Object.values(data).reverse().forEach(log => {
                if (log.status === 'SUCCESS') successes++;
                if (log.status === 'QUOTA_EXCEEDED') {
                    errors++;
                    keyStats[log.key_index] = 'Quota Limit';
                }

                const logEl = document.createElement('div');
                logEl.className = 'text-xs p-3 rounded-xl border border-white/5 bg-white/5';
                logEl.innerHTML = `
                    <div class="flex justify-between mb-1">
                        <span class="text-emerald-400 font-bold">KEY ${log.key_index}</span>
                        <span class="text-slate-500">${new Date(log.timestamp).toLocaleTimeString('he-IL')}</span>
                    </div>
                    <div class="text-slate-300">מודל: ${log.model}</div>
                    <div class="${log.status === 'SUCCESS' ? 'text-emerald-500' : 'text-amber-500'} font-medium">${log.status}</div>
                `;
                logsContainer.appendChild(logEl);
            });

            document.getElementById('success-count').innerText = successes;
            document.getElementById('error-count').innerText = errors;
            renderKeys(keyStats);
        });

        function renderKeys(stats) {
            const container = document.getElementById('keys-list');
            container.innerHTML = '';
            for (let i = 1; i <= 4; i++) {
                const status = stats[i];
                const isOk = status === 'Online';
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 rounded-2xl bg-white/5 border border-white/10">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center font-bold">#${i}</div>
                            <div>
                                <div class="font-bold">חשבון גוגל ${i}</div>
                                <div class="text-xs text-slate-400">מפתח API: GEMINI_API_KEY_${i === 1 ? '' : i}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <div class="text-left">
                                <div class="text-[10px] text-slate-500 uppercase font-bold">סטטוס</div>
                                <div class="text-sm font-bold ${isOk ? 'text-emerald-400' : 'text-amber-400'}">${status}</div>
                            </div>
                            <button class="px-3 py-1 bg-white/10 hover:bg-white/20 rounded-lg text-xs transition">ניהול ב-Supabase</button>
                        </div>
                    </div>
                `;
            }
        }
        
        lucide.createIcons();
    </script>
</body>
</html>
